system:
  node-name: ${NODE_NAME:local}
  node-ip: ${NODE_IP:127.0.0.1}
spring:
  main:
    cloud-platform: kubernetes
  cloud:
    kubernetes:
      discovery:
        metadata:
          add-labels: true
          add-pod-labels: true
        namespaces:
          - app
      client:
        namespace: app