spring:
  cloud:
    consul:
      host: ${CONSUL_HOST:127.0.0.1}
      port: ${CONSUL_PORT:8500}
      discovery:
        prefer-ip-address: true
        ip-address: ${system.node.ip}
        management-port: ${management.server.port}
        metadata:
          node-name: ${system.node.name}
          node-ip: ${system.node.ip}
          node-role: ${system.node.role}
