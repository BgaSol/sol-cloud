spring:
  cloud:
    consul:
      host: ${CONSUL_HOST:127.0.0.1}
      port: ${CONSUL_PORT:8500}
      discovery:
        prefer-ip-address: true
        ip-address: 192.168.1.139
        instance-id: ${spring.application.name}-${system.node.name}-${server.port}

        health-check-interval: 10s
        health-check-timeout: 3s
        health-check-critical-timeout: 1m

        metadata:
          node-name: ${system.node.name}
          node-ip: ${system.node.ip}
          node-role: ${system.node.role}
