spring:
  cloud:
    nacos:
      server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
      username: ${NACOS_USER:nacos}
      password: ${NACOS_PASSWORD:nacospwd}
      discovery:
        fail-fast: true
        ip: ${system.node.ip}
        cluster-name: DEFAULT
        metadata:
          node-name: ${system.node.name}
          node-ip: ${system.node.ip}
          node-role: ${system.node.role}
