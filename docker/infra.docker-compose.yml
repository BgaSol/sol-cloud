networks:
  cloud-app:
    external: true
volumes:
  pg-data:
services:
  # Minio 服务
  cloud-app-minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    container_name: cloud-app-minio
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1
    command:
      - server
      - /data
      - --console-address
      - :9001
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      TZ: ${TZ}
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - ./data/minio/data:/data
      - ./data/minio/root/.minio:/root/.minio
    networks:
      - cloud-app
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 3
  # PostgreSQL 数据库服务
  cloud-app-postgres:
    image: postgres:17.2
    container_name: cloud-app-postgres
    restart: unless-stopped
    mem_limit: 1g
    cpus: 1
    command: postgres -c config_file=/etc/postgresql/postgresql.conf
    environment:
      TZ: ${TZ}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pg-data:/var/lib/postgresql/data
      - ./data/postgres/log:/var/log/postgresql
      - ./config/postgres/initdb:/docker-entrypoint-initdb.d:ro
      - ./config/postgres/conf/postgresql.conf:/etc/postgresql/postgresql.conf:ro
    ports:
      - "5432:5432"
    networks:
      - cloud-app
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "postgres" ]
      interval: 10s
      timeout: 5s
      retries: 3
  # Redis 服务
  cloud-app-redis:
    image: redis:7.4.2
    container_name: cloud-app-redis
    restart: unless-stopped
    mem_limit: 256m
    cpus: 1
    environment:
      TZ: ${TZ}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command:
      - /bin/sh
      - -c
      - >
        redis-server
        --maxmemory 128mb
        --maxmemory-policy allkeys-lru
        --appendonly no
        --save ""
        --requirepass $$REDIS_PASSWORD
    ports:
      - "6379:6379"
    networks:
      - cloud-app
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3
  cloud-app-consul:
    image: hashicorp/consul:1.22.7
    container_name: cloud-app-consul
    restart: unless-stopped
    ports:
      - "8500:8500"
      - "8600:8600/udp"
    command: >
      consul agent
      -server
      -ui
      -node=local
      -bootstrap-expect=1
      -client=0.0.0.0
      -data-dir=/consul/data
    environment:
      TZ: ${TZ}
    mem_limit: 256m
    cpus: 1
    networks:
      - cloud-app
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8500/v1/status/leader" ]
      interval: 10s
      timeout: 5s
      retries: 3
  cloud-app-rabbitmq:
    image: rabbitmq:4.3.2-management
    container_name: cloud-app-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: rabbitmq
      RABBITMQ_DEFAULT_PASS: rabbitmqpwd
    volumes:
      - ./data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "check_running" ]
      interval: 30s
      timeout: 10s
      retries: 3